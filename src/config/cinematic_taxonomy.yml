# ── Cinematic Taxonomy & Visual Bible ──────────────────────────────────────
# Fase 1 — data layer for CID storyboard prompt enrichment.
# Each element belongs to exactly one category and carries:
#   id, name, category, description, prompt_tags (list),
#   negative_prompt_tags (list), use_cases (list).

shot_types:
  - id: ecu
    name: Extreme Close-Up
    category: shot_types
    description: Extreme close-up framing a detail (eyes, mouth, object). Maximum emotional intensity.
    prompt_tags: [extreme close-up shot, macro detail, intimate framing, shallow depth of field]
    negative_prompt_tags: [wide shot, full body, deep focus, environmental context]
    use_cases: [emotional climax, reveal critical detail, horror tension, character reaction]

  - id: cu
    name: Close-Up
    category: shot_types
    description: Close framing of face or object. Captures subtle expression and nuance.
    prompt_tags: [close-up shot, facial detail, intimate, soft background, medium shot alternative]
    negative_prompt_tags: [wide angle, full figure, expansive background]
    use_cases: [dialogue reaction, emotional beat, product detail, dramatic emphasis]

  - id: mcu
    name: Medium Close-Up
    category: shot_types
    description: From chest up. Balances expression with context. Standard dialogue coverage.
    prompt_tags: [medium close-up shot, chest up framing, dialogue ready, balanced composition]
    negative_prompt_tags: [extreme close-up, full body, wide establishing]
    use_cases: [dialogue scenes, interview framing, news anchor, YouTube talking head]

  - id: ms
    name: Medium Shot
    category: shot_types
    description: Waist up. Body language visible. Workhorse of narrative filmmaking.
    prompt_tags: [medium shot, waist up, body language visible, narrative framing]
    negative_prompt_tags: [close-up, extreme wide, macro]
    use_cases: [dialogue with gesture, walk and talk, standard coverage, sitcom framing]

  - id: mws
    name: Medium Wide Shot
    category: shot_types
    description: Knee up. Balances character and environment. Often used as a master.
    prompt_tags: [medium wide shot, knee up, character and environment balanced, master shot alternative]
    negative_prompt_tags: [close-up, extreme wide, intimate framing]
    use_cases: [scene master, group dialogue, action setup, establishing character in space]

  - id: ws
    name: Wide Shot
    category: shot_types
    description: Full body in environment. Establishes spatial relationships.
    prompt_tags: [wide shot, full body, environmental context, spatial relationships]
    negative_prompt_tags: [close framing, shallow depth of field, portrait]
    use_cases: [establishing scene, action choreography, landscape reveal, group staging]

  - id: ews
    name: Extreme Wide Shot
    category: shot_types
    description: Vast landscape or crowd. Character is small or absent. Pure geography.
    prompt_tags: [extreme wide shot, vast landscape, bird eye view, geographic context, epic scale]
    negative_prompt_tags: [character detail, intimate, close-up, medium framing]
    use_cases: [epic establishing, location reveal, crowd scale, natural vista]

  - id: ots
    name: Over the Shoulder
    category: shot_types
    description: Looking past a character's shoulder at the subject. Dialogue standard.
    prompt_tags: [over the shoulder shot, perspective from behind, dialogue composition, depth layering]
    negative_prompt_tags: [single character framing, profile shot, direct address]
    use_cases: [dialogue coverage, interrogation scene, conversation reverse shot]

  - id: pov
    name: Point of View
    category: shot_types
    description: Sees what the character sees. Subjective immersion.
    prompt_tags: [point of view shot, subjective camera, first person perspective, immersive]
    negative_prompt_tags: [third person, objective framing, omniscient, surveillance]
    use_cases: [horror reveal, action POV, character discovery, immersive sequence]

  - id: dutch
    name: Dutch Angle
    category: shot_types
    description: Tilted horizon. Disorientation, tension, psychological unease.
    prompt_tags: [dutch angle shot, tilted horizon, canted frame, disorienting composition, tension]
    negative_prompt_tags: [level horizon, stable composition, balanced framing]
    use_cases: [psychological thriller, disorientation scene, character breakdown, heist tension]

  - id: aerial
    name: Aerial Shot
    category: shot_types
    description: From above, drone or crane. God's eye perspective.
    prompt_tags: [aerial shot, bird eye view, top down, drone perspective, god view]
    negative_prompt_tags: [ground level, eye level, low angle]
    use_cases: [epic establishing, chase sequence, landscape reveal, crowd choreography]

composition:
  - id: rule_of_thirds
    name: Rule of Thirds
    category: composition
    description: Subject placed at intersection of imaginary 3x3 grid. Classic balanced framing.
    prompt_tags: [rule of thirds composition, balanced framing, classic cinematography]
    negative_prompt_tags: [center framing, symmetric composition, off-balance]
    use_cases: [standard dialogue, portrait framing, general narrative]

  - id: center_framing
    name: Center Framing
    category: composition
    description: Subject dead center. Authoritative, confrontational, or formal.
    prompt_tags: [center framing, symmetrical focus, direct address, formal composition]
    negative_prompt_tags: [rule of thirds, off-center, unbalanced, dynamic angle]
    use_cases: [authority figure, direct address to camera, formal portrait, Wes Anderson style]

  - id: leading_lines
    name: Leading Lines
    category: composition
    description: Lines in the frame guide the eye to the subject.
    prompt_tags: [leading lines composition, depth guide, visual flow, directional framing]
    negative_prompt_tags: [flat composition, no depth, cluttered, chaotic lines]
    use_cases: [journey sequence, corridor walk, road movie, architectural reveal]

  - id: symmetry
    name: Symmetry
    category: composition
    description: Mirror-like balance. Order, formality, or obsession.
    prompt_tags: [symmetrical composition, mirror framing, balanced reflection, formal order]
    negative_prompt_tags: [asymmetrical, rule of thirds, dynamic imbalance]
    use_cases: [Kubrick style, formal ceremony, architectural beauty, obsessive character]

  - id: frame_in_frame
    name: Frame Within a Frame
    category: composition
    description: Subject framed by doorways, windows, arches. Depth and voyeurism.
    prompt_tags: [frame within frame composition, natural framing, depth layering, voyeuristic]
    negative_prompt_tags: [open frame, flat composition, direct address, no depth]
    use_cases: [voyeuristic moment, character trapped, discovery through window, architectural depth]

  - id: shallow_depth
    name: Shallow Depth of Field
    category: composition
    description: Subject sharp, background blurred. Focus and isolation.
    prompt_tags: [shallow depth of field, blurred background, subject isolation, bokeh, creamy background]
    negative_prompt_tags: [deep focus, everything sharp, wide depth, deep depth of field]
    use_cases: [romantic close-up, dramatic focus, product hero shot, character isolation]

  - id: deep_focus
    name: Deep Focus
    category: composition
    description: Everything in frame is sharp. Information density, realism.
    prompt_tags: [deep focus, everything sharp, wide depth of field, information rich frame, cinematic realism]
    negative_prompt_tags: [shallow depth of field, bokeh, blurred background, selective focus]
    use_cases: [realist drama, ensemble staging, complex action, wide landscape]

camera_movements:
  - id: pan
    name: Pan
    category: camera_movements
    description: Horizontal rotation on tripod. Reveals space laterally.
    prompt_tags: [panning camera movement, horizontal rotation, lateral reveal, tripod pan]
    negative_prompt_tags: [static camera, tracking movement, vertical movement]
    use_cases: [landscape reveal, following horizontal action, room scan]

  - id: tilt
    name: Tilt
    category: camera_movements
    description: Vertical rotation on tripod. Reveals height or scale.
    prompt_tags: [tilting camera movement, vertical rotation, height reveal, upward tilt, downward tilt]
    negative_prompt_tags: [static camera, horizontal movement, panning]
    use_cases: [tall building reveal, character look up/down, scale emphasis]

  - id: dolly
    name: Dolly
    category: camera_movements
    description: Camera moves toward or away from subject on track. Emotional push/pull.
    prompt_tags: [dolly camera movement, tracking forward, push in, pull out, track movement]
    negative_prompt_tags: [static camera, handheld, zoom, pan]
    use_cases: [dramatic reveal, emotional emphasis, horror approach, discovery pull back]

  - id: tracking
    name: Tracking Shot
    category: camera_movements
    description: Camera moves parallel to subject. Follows movement smoothly.
    prompt_tags: [tracking shot, lateral movement, parallel follow, smooth camera movement]
    negative_prompt_tags: [static camera, whip pan, handheld shake, zoom]
    use_cases: [walk and talk, chase sequence, parade, journey montage]

  - id: crane
    name: Crane Shot
    category: camera_movements
    description: Camera rises or falls on a crane. Grand scale reveal or descent.
    prompt_tags: [crane shot, elevating camera, descending camera, aerial rise, grand reveal]
    negative_prompt_tags: [ground level, handheld, shoulder mount, static]
    use_cases: [epic establishing, grand entrance, scale reveal, triumphant moment]

  - id: steadicam
    name: Steadicam Shot
    category: camera_movements
    description: Smooth moving camera, operator walking. Fluid, immersive, continuous.
    prompt_tags: [steadicam shot, smooth walking camera, fluid movement, immersive continuous shot]
    negative_prompt_tags: [static tripod, shaky handheld, dolly track visible, jerky]
    use_cases: [continuous sequence shot, corridor follow, party weave, backstage pass]

  - id: handheld
    name: Handheld
    category: camera_movements
    description: Camera held by operator. Raw, urgent, documentary realism.
    prompt_tags: [handheld camera, documentary style, raw movement, urgent feel, cinéma vérité]
    negative_prompt_tags: [smooth steadicam, tripod stable, crane smooth, dolly track]
    use_cases: [action urgency, documentary realism, horror chase, war zone, found footage]

  - id: whip_pan
    name: Whip Pan
    category: camera_movements
    description: Fast horizontal rotation. Energetic transition or disorientation.
    prompt_tags: [whip pan, fast camera rotation, rapid movement, dynamic transition, swish pan]
    negative_prompt_tags: [smooth pan, slow reveal, static, gentle camera]
    use_cases: [action transition, fight scene impact, energetic cut, disorientation]

  - id: zoom
    name: Zoom
    category: camera_movements
    description: Focal length change. Push in or pull out optically. Hitchcockian.
    prompt_tags: [zoom shot, focal length change, optical push, dolly zoom effect, vertigo effect]
    negative_prompt_tags: [dolly movement, tracking, physical camera move, prime lens]
    use_cases: [sudden reveal, vertigo effect, dramatic emphasis, Hitchcock homage]

visual_styles:
  - id: hand_drawn_storyboard
    name: Hand-Drawn Storyboard
    category: visual_styles
    description: Traditional pencil or ink storyboard sketch. Pre-visualization standard.
    prompt_tags: [hand drawn storyboard, storyboard sketch, pencil drawing, rough storyboard, previsualization]
    negative_prompt_tags: [photorealistic, 3d render, digital art, painting, oil paint]
    use_cases: [early previs, director pitch, shot planning, blocking exploration]

  - id: rough_pencil_storyboard
    name: Rough Pencil Storyboard
    category: visual_styles
    description: Quick loose pencil sketches. Fast ideation, capturing composition only.
    prompt_tags: [rough pencil sketch, loose storyboard, quick previs, compositional thumbnail]
    negative_prompt_tags: [detailed rendering, inked lines, color, shading, finished art]
    use_cases: [rapid ideation, first pass blocking, shot list thumbnail, early pitch]

  - id: ink_storyboard
    name: Ink Storyboard
    category: visual_styles
    description: Clean ink line art. High contrast, graphic, comic book aesthetic.
    prompt_tags: [ink storyboard, line art, comic style, high contrast, ink drawing, bold lines]
    negative_prompt_tags: [pencil sketch, watercolor, photorealistic, pastel, color wash]
    use_cases: [comic adaptation, graphic novel previs, high contrast scene, action storyboard]

  - id: charcoal_storyboard
    name: Charcoal Storyboard
    category: visual_styles
    description: Charcoal or pastel. Moody, textured, dramatic lighting emphasis.
    prompt_tags: [charcoal drawing, pastel storyboard, moody texture, dramatic lighting sketch, dark previs]
    negative_prompt_tags: [clean line art, digital crisp, bright colors, photorealistic]
    use_cases: [film noir previs, horror storyboard, dramatic lighting study, mood exploration]

  - id: graphic_novel_storyboard
    name: Graphic Novel Storyboard
    category: visual_styles
    description: Color comic panel style. Vibrant, dramatic, editorial.
    prompt_tags: [graphic novel style, comic panel, vibrant colors, dramatic shading, cel shaded]
    negative_prompt_tags: [pencil sketch, realistic photo, oil painting, watercolor, pastel]
    use_cases: [graphic novel adaptation, vibrant action, superhero genre, color script]

  - id: cinematic_realistic
    name: Cinematic Realistic
    category: visual_styles
    description: Photorealistic previs. Actual look and feel of final frame.
    prompt_tags: [cinematic photorealistic, film quality render, realistic previs, final frame quality]
    negative_prompt_tags: [sketch, drawing, cartoon, illustration, line art, storyboard rough]
    use_cases: [final previs, client presentation, VFX previz, lighting reference]

