# AILinkCinema - Compose for Home Demo
# Usage: docker compose -f compose.base.yml -f compose.home.yml up
# For remote laptop access, add: -f compose.home.tailscale.yml

services:
  # ==================== HOME SPECIFIC CONFIGURATION ====================

  # Backend - Home configuration with localhost ComfyUI
  backend:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      COMFYUI_BASE_URL: ${COMFYUI_STILL_URL:-http://host.docker.internal:8188}
      COMFYUI_STILL: ${COMFYUI_STILL_URL:-http://host.docker.internal:8188}
      COMFYUI_VIDEO: ${COMFYUI_VIDEO_URL:-http://host.docker.internal:8189}
      COMFYUI_DUBBING: ${COMFYUI_DUBBING_URL:-http://host.docker.internal:8190}
      COMFYUI_LAB: ${COMFYUI_LAB_URL:-http://host.docker.internal:8191}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./ailinkcinema.db}
      BACKEND_HOST: 0.0.0.0

  frontend:
    build:
      args:
        VITE_API_URL: /api
    environment:
      VITE_API_URL: /api
      VITE_WS_URL: ws://${PUBLIC_HOST:-localhost}:8000

  reverse-proxy:
    volumes:
      - ./Caddyfile.deploy:/etc/caddy/Caddyfile:ro
    environment:
      CADDY_HOST: ${PUBLIC_HOST:-localhost}
      CADDY_PORT: 80
