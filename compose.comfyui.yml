services:
  comfyui-still:
    image: ${COMFYUI_IMAGE:?Set COMFYUI_IMAGE in .env}
    profiles: ["with-comfyui"]
    restart: unless-stopped
    environment:
      COMFYUI_ARGS: --listen 0.0.0.0 --port 8188
      CLI_ARGS: --listen 0.0.0.0 --port 8188
    ports:
      - "${COMFYUI_BIND_ADDR:-127.0.0.1}:${COMFYUI_STILL_HOST_PORT:-8188}:8188"
    volumes:
      - "${COMFYUI_STILL_MODELS_DIR:-/home/harliesound/ai/ComfyUI_instances/ComfyUI-image/models}:${COMFYUI_CONTAINER_ROOT:-/root/ComfyUI}/models:ro"
      - "${COMFYUI_STILL_CUSTOM_NODES_DIR:-/home/harliesound/ai/ComfyUI_instances/ComfyUI-image/custom_nodes}:${COMFYUI_CONTAINER_ROOT:-/root/ComfyUI}/custom_nodes"
      - "${COMFYUI_STILL_INPUT_DIR:-/home/harliesound/ai/ComfyUI_instances/ComfyUI-image/input}:${COMFYUI_CONTAINER_ROOT:-/root/ComfyUI}/input"
      - "${COMFYUI_STILL_OUTPUT_DIR:-/home/harliesound/ai/ComfyUI_instances/ComfyUI-image/output}:${COMFYUI_CONTAINER_ROOT:-/root/ComfyUI}/output"
      - "${COMFYUI_STILL_USER_DIR:-/home/harliesound/ai/ComfyUI_instances/ComfyUI-image/user}:${COMFYUI_CONTAINER_ROOT:-/root/ComfyUI}/user"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8188/system_stats', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks:
      - private_net

