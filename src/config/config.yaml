app:
  name: "AILinkCinema"
  env: "production"
  debug: false
  host: "0.0.0.0"
  port: 8000
  reload: false
  secret_key: "ailink-cine-secret-key-prod-2024"

auth:
  secret_key: "ailink-cine-secret-key-prod-2024"
  algorithm: "HS256"
  access_token_expire_minutes: 60

cors:
  allow_origins:
    - "http://localhost"
    - "https://localhost"
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "http://172.24.174.31"
    - "https://172.24.174.31"
    - "http://100.104.219.15"
    - "https://100.104.219.15"
    - "http://100.104.219.15:3000"
    - "http://100.104.219.15:80"
    - "http://ailinkcinema"
    - "http://ailinkcinema:80"
  allow_credentials: true
  allow_methods:
    - "*"
  allow_headers:
    - "*"

logging:
  level: "INFO"
  file: "logs/app.log"

queue:
  enabled: true
  scheduler_enabled: true
  poll_interval_seconds: 5
  default_timeout_seconds: 3600
  persistence_mode: "memory"
  production_ready: false

health:
  enabled: true
  check_backends_on_startup: false

demo:
  enabled: false
  auto_seed_narrative: false  # Set to true to auto-seed narrative on startup

storage:
  type: "local"
  data_dir: "data"
  temp_dir: "data/temp"
  output_dir: "data/output"

frontend:
  dev_url: "http://localhost:3000"

database:
  url: "sqlite+aiosqlite:///./ailinkcinema_s2.db"
  runtime_schema_sync: true
  sqlite_legacy_bootstrap: true

features:
  workflows: true
  presets: true
  plans: true
  queue: true
  admin: true
  experimental: false
  postproduction: false
