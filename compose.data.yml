# AILinkCinema — Data Stack Compose (PostgreSQL + Redis + Qdrant)
# =============================================================================
# Usage:
#   docker compose -f compose.base.yml -f compose.data.yml -f compose.home.yml up
#
# Profiles:
#   with-redis: includes Redis service (optional)
#
# Networks:
#   private_net — must be defined in compose.base.yml
# =============================================================================

services:
  # ── POSTGRESQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ailinkcinema_postgres
    profiles: ["with-postgres"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ailinkcinema}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ailinkcinema}
    volumes:
      - ${POSTGRES_VOLUME:-postgres_data}:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_BIND_ADDR:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ailinkcinema} -d ${POSTGRES_DB:-ailinkcinema}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - private_net

  # ── REDIS (optional, profile: with-redis) ───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ailinkcinema_redis
    profiles: ["with-redis"]
    volumes:
      - ${REDIS_VOLUME:-redis_data}:/data
    ports:
      - "${REDIS_BIND_ADDR:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    command: >
      sh -c '
        if [ -n "$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$REDIS_PASSWORD"
        else
          exec redis-server --appendonly yes
        fi
      '
    healthcheck:
      test: >
        sh -c '
          if [ -n "$REDIS_PASSWORD" ]; then
            redis-cli -a "$REDIS_PASSWORD" ping
          else
            redis-cli ping
          fi
        '
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - private_net

  # ── QDRANT (vector search) ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ailinkcinema_qdrant
    profiles: ["with-qdrant"]
    volumes:
      - ${QDRANT_VOLUME:-qdrant_data}:/qdrant/storage
    ports:
      - "${QDRANT_BIND_ADDR:-127.0.0.1}:${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_BIND_ADDR:-127.0.0.1}:${QDRANT_GRPC_PORT:-6334}:6334"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - private_net

# ── VOLUMES ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-ailinkcinema_postgres_data}
  redis_data:
    name: ${REDIS_VOLUME_NAME:-ailinkcinema_redis_data}
  qdrant_data:
    name: ${QDRANT_VOLUME_NAME:-ailinkcinema_qdrant_data}
