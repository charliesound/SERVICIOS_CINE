# ── Cinematic Presets ───────────────────────────────────────────────────────
# Each preset combines elements from multiple categories to create a
# coherent cinematographic look and feel.

cinematic_presets:
  - id: noir_classic
    name: Classic Film Noir
    description: High contrast, shadowy, urban crime aesthetic. Low-key lighting, dutch angles, desaturated.
    shot_types: [cu, mcu, dutch]
    composition: [shallow_depth, leading_lines]
    camera_movements: [dolly, pan]
    visual_styles: [charcoal_storyboard]
    modern_cameras: []
    analog_cameras: [arri_416]
    film_stocks: [kodak_vision3_500t]
    lighting_styles: [low_key, chiaroscuro]
    color_grading: [desaturated]
    narrative_styles: [classical]
    prompt_tags: [film noir aesthetic, classic noir, shadowy crime, detective feel, 1940s cinema]
    negative_prompt_tags: [bright, colorful, high key, romantic comedy, daylight, vibrant]

