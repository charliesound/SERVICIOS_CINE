services:
  backend:
    build:
      context: ../../src
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////app/data/ailinkcinema_s2.db}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      PYTHONUNBUFFERED: "1"
    ports:
      - "${BACKEND_PUBLISH_PORT:-8010}:8000"
    volumes:
      - ${BACKEND_DATA_DIR:-./data/local/backend}:/app/data
      - ${HOST_DEMO_INGEST_PATH:-/home/harliesound/demo_ingest}:/data/demo_ingest:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ../../src_frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PUBLISH_PORT:-8080}:80"
    restart: unless-stopped
