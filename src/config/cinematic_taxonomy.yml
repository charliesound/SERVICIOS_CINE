    modern_cameras: [arri_alexa_35, panavision_dxl2]
    analog_cameras: []
    film_stocks: [kodak_vision3_250d]
    lighting_styles: [golden_hour, naturalistic]
    color_grading: [teal_orange, vibrant]
    narrative_styles: [classical]
    prompt_tags: [epic scale, blockbuster look, cinematic wide, grand spectacle, hollywood epic]
    negative_prompt_tags: [intimate, handheld, low budget, documentary style, small scale]

  - id: indie_intimate
