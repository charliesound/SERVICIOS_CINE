services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: cine-api
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-CINE AI PLATFORM API}
      APP_ENV: ${APP_ENV:-production}
      API_HOST: 0.0.0.0
      API_PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-}
      SHOTS_STORE_BACKEND: ${SHOTS_STORE_BACKEND:-sqlite}
      SHOTS_JSON_FILE: /app/data/shots.json
      SHOTS_SQLITE_FILE: /app/data/shots.db
      RENDER_JOBS_SQLITE_FILE: /app/data/render_jobs.db
      ENABLE_LEGACY_ROUTES: ${ENABLE_LEGACY_ROUTES:-false}
      COMFYUI_BASE_URL: ${COMFYUI_BASE_URL:-http://host.docker.internal:8188}
    ports:
      - "${API_PORT_BIND:-3000}:3000"
    volumes:
      - ./apps/api/data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/api/health', timeout=5).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: cine-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT_BIND:-8080}:80"
