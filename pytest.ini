[pytest]
testpaths = tests
norecursedirs =
    OLD
    ai-dubbing-legal-studio
    .venv
    src/.venv
    node_modules
    dist
    build
pythonpath =
    src
asyncio_mode = auto
markers =
    asyncio: mark test as async
    legacy_sqlite: legacy tests requiring historical SQLite setup; not valid for new CID SaaS PostgreSQL-only gates
    postgres_required: tests that require a real PostgreSQL test DSN
    postgres_validated: tests valid for PostgreSQL-only acceptance gates without requiring legacy SQLite
