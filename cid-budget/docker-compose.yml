services:
  budget-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cid_budget
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  budget-api:
    build: ./backend
    ports:
      - "8500:8500"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@budget-db:5432/cid_budget
      - CID_API_URL=${CID_API_URL:-http://host.docker.internal:8000}
      - JWT_SECRET=${JWT_SECRET:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
    depends_on:
      budget-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  budget-frontend:
    build: ./frontend
    ports:
      - "8501:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8500}
    depends_on:
      - budget-api

volumes:
  pgdata:
