backends:
  still:
    name: "Still Image Generation"
    type: "comfyui"
    host: "127.0.0.1"
    port: 8188
    base_url: "http://127.0.0.1:8188"
    health_endpoint: "/system_stats"
    max_concurrent_jobs: 2
    priority: 3
    enabled: true
    capabilities:
      - "image_generation"
      - "image_to_image"
      - "inpainting"
      - "outpainting"

  video:
    name: "Video Generation"
    type: "comfyui"
    host: "127.0.0.1"
    port: 8189
    base_url: "http://127.0.0.1:8189"
    health_endpoint: "/system_stats"
    max_concurrent_jobs: 1
    priority: 4
    enabled: true
    capabilities:
      - "text_to_video"
      - "image_to_video"
      - "video_to_video"
      - "interpolation"

  dubbing:
    name: "Dubbing & Voice"
    type: "comfyui"
    host: "127.0.0.1"
    port: 8190
    base_url: "http://127.0.0.1:8190"
    health_endpoint: "/system_stats"
    max_concurrent_jobs: 2
    priority: 3
    enabled: true
    capabilities:
      - "tts"
      - "voice_clone"
      - "audio_sync"
      - "lip_sync"

  restoration:
    name: "Restoration / Conform / Cleanup"
    type: "comfyui"
    host: "127.0.0.1"
    port: 8191
    base_url: "http://127.0.0.1:8191"
    health_endpoint: "/system_stats"
    max_concurrent_jobs: 1
    priority: 2
    enabled: true
    capabilities:
      - "image_restoration"
      - "video_restoration"
      - "conform"
      - "cleanup"
      - "restoration"

  3d:
    name: "3D Generation"
    type: "comfyui"
    host: "127.0.0.1"
    port: 8192
    base_url: "http://127.0.0.1:8192"
    health_endpoint: "/system_stats"
    max_concurrent_jobs: 1
    priority: 2
    enabled: true
    capabilities:
      - "3d_generation"
      - "nerf"
      - "scene_3d"
      - "depth"
      - "geometry"

  lab:
    name: "Experimental Lab / Storyboard Sketch"
    type: "comfyui"
    host: "127.0.0.1"
    port: 8191
    base_url: "http://127.0.0.1:8191"
    health_endpoint: "/system_stats"
    max_concurrent_jobs: 1
    priority: 1
    enabled: true
    capabilities:
      - "experimental"
      - "research"
      - "testing"
      - "sketch"

routing_rules:
  task_type_mapping:
    # Image generation
    still: "still"
    image: "still"
    img2img: "still"
    inpaint: "still"
    outpaint: "still"

    # Storyboard modes (dual routing)
    storyboard: "still"
    storyboard_realistic: "still"
    storyboard_sketch: "lab"

    # Video generation
    video: "video"
    cine: "video"
    text_to_video: "video"
    img2vid: "video"

    # Dubbing/Audio
    dubbing: "dubbing"
    audio: "dubbing"
    voice: "dubbing"
    tts: "dubbing"
    voice_clone: "dubbing"

    # Restoration / conform
    restoration: "restoration"
    restore: "restoration"
    conform: "restoration"
    cleanup: "restoration"
    picture_conform: "restoration"

    # 3D
    3d: "3d"
    three_d: "3d"
    nerf: "3d"
    scene_3d: "3d"
    depth: "3d"

    # Experimental
    experimental: "lab"
    test: "lab"
    research: "lab"

  fallback_backend: "still"
  experimental_backend: "lab"

health_check:
  interval_seconds: 30
  timeout_seconds: 5
  max_retries: 3
