name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      ENABLE_LEGACY_ROUTES: "false"
      SHOTS_STORE_BACKEND: sqlite
      SHOTS_JSON_FILE: ./data/shots.json
      SHOTS_SQLITE_FILE: ./data/shots.db
      RENDER_JOBS_SQLITE_FILE: ./data/render_jobs_ci.db
      COMFYUI_BASE_URL: http://127.0.0.1:8188
      COMFYUI_TIMEOUT_SECONDS: "1.5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Smoke import backend app
        run: python -c "import src.app"

      - name: Start backend for HTTP smoke
        run: python -m uvicorn src.app:app --host 127.0.0.1 --port 3100 > /tmp/api.log 2>&1 & echo $! > /tmp/api.pid

      - name: Wait for backend health endpoint
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3100/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become healthy in time"
          cat /tmp/api.log || true
          exit 1

      - name: HTTP smoke endpoints
        run: python scripts/http_smoke.py --base-url http://127.0.0.1:3100 --wait-seconds 10

      - name: Stop backend after smoke
        if: always()
        run: |
          if [ -f /tmp/api.pid ]; then
            kill "$(cat /tmp/api.pid)" || true
          fi
          cat /tmp/api.log || true
