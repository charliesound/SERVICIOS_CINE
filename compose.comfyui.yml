services:
  comfyui-still:
    image: ${COMFYUI_IMAGE:?Set COMFYUI_IMAGE in .env}
    profiles: ["with-comfyui"]
    restart: unless-stopped
    environment:
      COMFYUI_ARGS: --listen 0.0.0.0 --port 8188
      CLI_ARGS: --listen 0.0.0.0 --port 8188
    ports:
      - "${COMFYUI_BIND_ADDR:-127.0.0.1}:8188:8188"
    volumes:
      - "${COMFYUI_STILL_MODELS_DIR:-/home/harliesound/ai/ComfyUI_instances/ComfyUI-image/models}:/workspace/ComfyUI/models:ro"
      - "${COMFYUI_STILL_CUSTOM_NODES_DIR:-/home/harliesound/ai/ComfyUI_instances/ComfyUI-image/custom_nodes}:/workspace/ComfyUI/custom_nodes"
      - "${COMFYUI_STILL_INPUT_DIR:-/home/harliesound/ai/ComfyUI_instances/ComfyUI-image/input}:/workspace/ComfyUI/input"
      - "${COMFYUI_STILL_OUTPUT_DIR:-/home/harliesound/ai/ComfyUI_instances/ComfyUI-image/output}:/workspace/ComfyUI/output"
      - "${COMFYUI_STILL_USER_DIR:-/home/harliesound/ai/ComfyUI_instances/ComfyUI-image/user}:/workspace/ComfyUI/user"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8188/system_stats >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks:
      - private_net

