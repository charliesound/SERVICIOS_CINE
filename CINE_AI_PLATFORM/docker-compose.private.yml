services:
  nginx:
    image: nginx:1.27-alpine
    container_name: cine-private-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
      n8n:
        condition: service_started
    ports:
      - "${NGINX_PORT_BIND:-80}:80"
    volumes:
      - ./infra/nginx/default.private.conf:/etc/nginx/conf.d/default.conf:ro
      - "${NGINX_LOG_PATH}:/var/log/nginx"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: cine-private-api
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-CINE AI PLATFORM API}
      APP_ENV: ${APP_ENV:-production}
      API_HOST: 0.0.0.0
      API_PORT: 3000
      CORS_ORIGINS: ${PRIVATE_BROWSER_ORIGINS}
      FRONTEND_ORIGINS: ${PRIVATE_BROWSER_ORIGINS}
      SHOTS_STORE_BACKEND: ${SHOTS_STORE_BACKEND:-sqlite}
      SHOTS_JSON_FILE: /app/data/shots.json
      SHOTS_SQLITE_FILE: /app/data/shots.db
      RENDER_JOBS_SQLITE_FILE: /app/data/render_jobs.db
      AUTH_SQLITE_FILE: /app/data/auth.db
      AUTH_SESSION_TTL_DAYS: ${AUTH_SESSION_TTL_DAYS:-30}
      AUTH_BOOTSTRAP_USERS: ${AUTH_BOOTSTRAP_USERS:-admin@cine.local:admin1234:admin,editor@cine.local:editor1234:editor,reviewer@cine.local:reviewer1234:reviewer,viewer@cine.local:viewer1234:viewer}
      ENABLE_LEGACY_ROUTES: ${ENABLE_LEGACY_ROUTES:-false}
      COMFYUI_BASE_URL: ${COMFYUI_BASE_URL:-http://host.docker.internal:8188}
      COMFYUI_TIMEOUT_SECONDS: ${COMFYUI_TIMEOUT_SECONDS:-5.0}
    expose:
      - "3000"
    volumes:
      - "${API_DATA_PATH}:/app/data"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/api/health', timeout=5).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: cine-private-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "80"

  n8n:
    image: n8nio/n8n:1.82.3
    container_name: cine-private-n8n
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_PATH: /n8n/
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_SECURE_COOKIE: "false"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}
      TZ: ${GENERIC_TIMEZONE:-UTC}
      QDRANT_URL: http://qdrant:6333
    expose:
      - "5678"
    volumes:
      - "${N8N_DATA_PATH}:/home/node/.n8n"
    depends_on:
      qdrant:
        condition: service_started

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: cine-private-qdrant
    restart: unless-stopped
    expose:
      - "6333"
      - "6334"
    volumes:
      - "${QDRANT_STORAGE_PATH}:/qdrant/storage"
