services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dubbing
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: dubbing_legal
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dubbing-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dubbing"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    networks:
      - dubbing-net
    volumes:
      - qdrantdata:/qdrant/storage

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    networks:
      - dubbing-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-dubbing}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    networks:
      - dubbing-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      - APP_NAME=AI Dubbing Legal Studio
      - APP_VERSION=1.0.0
      - DEBUG=false
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS:-24}
      - DATABASE_URL=postgresql+asyncpg://dubbing:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/dubbing_legal
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_PROVIDER=minio
      - STORAGE_LOCAL_PATH=/data/storage
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-dubbing}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      - MINIO_BUCKET=${MINIO_BUCKET:-dubbing-assets}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS is required}
      - COMFYUI_BASE_URL=${COMFYUI_BASE_URL:-http://host.docker.internal:8188}
      - COMFYUI_STILL=${COMFYUI_STILL:-http://host.docker.internal:8188}
      - COMFYUI_VIDEO=${COMFYUI_VIDEO:-http://host.docker.internal:8189}
      - COMFYUI_DUBBING=${COMFYUI_DUBBING:-http://host.docker.internal:8190}
      - COMFYUI_LAB=${COMFYUI_LAB:-http://host.docker.internal:8191}
      - COMFYUI_POLL_INTERVAL=${COMFYUI_POLL_INTERVAL:-2}
      - COMFYUI_POLL_TIMEOUT=${COMFYUI_POLL_TIMEOUT:-300}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ASR_PROVIDER=${ASR_PROVIDER:-comfyui}
      - TTS_PROVIDER=${TTS_PROVIDER:-comfyui}
      - LIPSYNC_PROVIDER=${LIPSYNC_PROVIDER:-comfyui}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./data/storage:/data/storage
    networks:
      - dubbing-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      - APP_NAME=AI Dubbing Legal Studio
      - APP_VERSION=1.0.0
      - DEBUG=false
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS:-24}
      - DATABASE_URL=postgresql+asyncpg://dubbing:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/dubbing_legal
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_PROVIDER=minio
      - STORAGE_LOCAL_PATH=/data/storage
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-dubbing}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      - MINIO_BUCKET=${MINIO_BUCKET:-dubbing-assets}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS is required}
      - COMFYUI_BASE_URL=${COMFYUI_BASE_URL:-http://host.docker.internal:8188}
      - COMFYUI_STILL=${COMFYUI_STILL:-http://host.docker.internal:8188}
      - COMFYUI_VIDEO=${COMFYUI_VIDEO:-http://host.docker.internal:8189}
      - COMFYUI_DUBBING=${COMFYUI_DUBBING:-http://host.docker.internal:8190}
      - COMFYUI_LAB=${COMFYUI_LAB:-http://host.docker.internal:8191}
      - COMFYUI_POLL_INTERVAL=${COMFYUI_POLL_INTERVAL:-2}
      - COMFYUI_POLL_TIMEOUT=${COMFYUI_POLL_TIMEOUT:-300}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ASR_PROVIDER=${ASR_PROVIDER:-comfyui}
      - TTS_PROVIDER=${TTS_PROVIDER:-comfyui}
      - LIPSYNC_PROVIDER=${LIPSYNC_PROVIDER:-comfyui}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-2}
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./data/storage:/data/storage
    networks:
      - dubbing-net
    restart: unless-stopped
    command: python -m app.workers.main_worker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    networks:
      - dubbing-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - dubbing-net
    restart: unless-stopped

networks:
  dubbing-net:
    driver: bridge

volumes:
  pgdata:
  qdrantdata:
  redisdata:
  miniodata:
