backends:
  still:
    name: "Still Image Generation"
    type: "comfyui"
    host: "127.0.0.1"
    port: 8188
    base_url: "http://127.0.0.1:8188"
    health_endpoint: "/system_stats"
    max_concurrent_jobs: 5
    priority: 1
    enabled: true
    capabilities:
      - "image_generation"
      - "image_to_image"
      - "inpainting"
      - "outpainting"

  video:
    name: "Video Generation"
    type: "comfyui"
    host: "127.0.0.1"
    port: 8189
    base_url: "http://127.0.0.1:8189"
    health_endpoint: "/system_stats"
    max_concurrent_jobs: 3
    priority: 2
    enabled: true
    capabilities:
      - "text_to_video"
      - "image_to_video"
      - "video_to_video"
      - "interpolation"

  dubbing:
    name: "Dubbing & Voice"
    type: "comfyui"
    host: "127.0.0.1"
    port: 8190
    base_url: "http://127.0.0.1:8190"
    health_endpoint: "/system_stats"
    max_concurrent_jobs: 2
    priority: 3
    enabled: true
    capabilities:
      - "tts"
      - "voice_clone"
      - "audio_sync"
      - "lip_sync"

  lab:
    name: "Experimental Lab"
    type: "comfyui"
    host: "127.0.0.1"
    port: 8191
    base_url: "http://127.0.0.1:8191"
    health_endpoint: "/system_stats"
    max_concurrent_jobs: 10
    priority: 10
    enabled: true
    capabilities:
      - "experimental"
      - "research"
      - "testing"

routing_rules:
  task_type_mapping:
    still: "still"
    image: "still"
    img2img: "still"
    inpaint: "still"
    outpaint: "still"
    
    video: "video"
    text_to_video: "video"
    img2vid: "video"
    
    dubbing: "dubbing"
    voice: "dubbing"
    tts: "dubbing"
    voice_clone: "dubbing"
    
    experimental: "lab"
    test: "lab"
    research: "lab"

  fallback_backend: "still"
  experimental_backend: "lab"

health_check:
  interval_seconds: 30
  timeout_seconds: 5
  max_retries: 3
