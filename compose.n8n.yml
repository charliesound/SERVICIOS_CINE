services:
  n8n:
    image: ${N8N_IMAGE:-n8nio/n8n:1}
    container_name: ailinkcinema_n8n
    profiles:
      - with-n8n
    environment:
      # General
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY is required}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Europe/Madrid}
      TZ: ${TZ:-Europe/Madrid}

      # Privacy / housekeeping
      N8N_PERSONALIZATION_ENABLED: ${N8N_PERSONALIZATION_ENABLED:-false}
      N8N_DIAGNOSTICS_ENABLED: ${N8N_DIAGNOSTICS_ENABLED:-false}
      N8N_VERSION_NOTIFICATIONS_ENABLED: ${N8N_VERSION_NOTIFICATIONS_ENABLED:-false}
      EXECUTIONS_DATA_PRUNE: ${N8N_EXECUTIONS_DATA_PRUNE:-true}
      EXECUTIONS_DATA_MAX_AGE: ${N8N_EXECUTIONS_DATA_MAX_AGE:-336}

      # PostgreSQL via compose.data.yml
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-ailinkcinema}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-ailinkcinema}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_POSTGRESDB_POOL_SIZE: ${N8N_DB_POOL_SIZE:-3}
      DB_TABLE_PREFIX: ${N8N_DB_TABLE_PREFIX:-n8n_}

    volumes:
      - n8n_data:/home/node/.n8n

    ports:
      - "${N8N_PORT:-5678}:5678"

    depends_on:
      postgres:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - private_net

networks:
  private_net:
    external: false

volumes:
  n8n_data:
    name: ${N8N_VOLUME_NAME:-ailinkcinema_n8n_data}
