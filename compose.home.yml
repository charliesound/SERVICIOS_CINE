# AILinkCinema - Compose for Home Demo
# Usage: docker compose -f compose.base.yml -f compose.home.yml up
# For remote laptop access, add: -f compose.home.tailscale.yml

services:
  # ==================== HOME SPECIFIC CONFIGURATION ====================

  # Backend - Home configuration with localhost ComfyUI
  backend:
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - public_net
      - private_net
      - servicios_cine_private_net
    environment:
      COMFYUI_BASE_URL: ${COMFYUI_BASE_URL:-http://172.24.174.31:8188}
      COMFYUI_STORYBOARD_BASE_URL: ${COMFYUI_STORYBOARD_BASE_URL:-http://172.24.174.31:8188}
      COMFYUI_STILL_BASE_URL: ${COMFYUI_STILL_BASE_URL:-http://172.24.174.31:8188}
      COMFYUI_VIDEO_BASE_URL: ${COMFYUI_VIDEO_BASE_URL:-http://172.24.174.31:8189}
      COMFYUI_DUBBING_BASE_URL: ${COMFYUI_DUBBING_BASE_URL:-http://172.24.174.31:8190}
      COMFYUI_RESTORATION_BASE_URL: ${COMFYUI_RESTORATION_BASE_URL:-http://172.24.174.31:8191}
      COMFYUI_LAB_BASE_URL: ${COMFYUI_LAB_BASE_URL:-http://172.24.174.31:8191}
      COMFYUI_3D_BASE_URL: ${COMFYUI_3D_BASE_URL:-http://172.24.174.31:8192}
      COMFYUI_HTTP_TIMEOUT: ${COMFYUI_HTTP_TIMEOUT:-300}
      COMFYUI_TIMEOUT_SECONDS: ${COMFYUI_TIMEOUT_SECONDS:-300}
      COMFYUI_STILL: ${COMFYUI_STILL_BASE_URL:-http://172.24.174.31:8188}
      COMFYUI_VIDEO: ${COMFYUI_VIDEO_BASE_URL:-http://172.24.174.31:8189}
      COMFYUI_DUBBING: ${COMFYUI_DUBBING_BASE_URL:-http://172.24.174.31:8190}
      COMFYUI_LAB: ${COMFYUI_LAB_BASE_URL:-http://172.24.174.31:8191}
      DATABASE_URL: postgresql+asyncpg://ailinkcinema:${POSTGRES_PASSWORD}@ailinkcinema_postgres:5432/ailinkcinema
      BACKEND_HOST: 127.0.0.1
      QDRANT_URL: http://qdrant:6333
      CID_MEMORY_COLLECTION: cid_memory
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: nomic-embed-text:v1.5
      EMBEDDING_VECTOR_SIZE: 768
      OLLAMA_URL: http://ollama:11434

  frontend:
    build:
      args:
        VITE_API_URL: /api
    environment:
      VITE_API_URL: /api
      VITE_WS_URL: ws://${PUBLIC_HOST:-localhost}:8000

  reverse-proxy:
    volumes:
      - ./Caddyfile.deploy:/etc/caddy/Caddyfile:ro
    environment:
      CADDY_HOST: ${PUBLIC_HOST:-localhost}
      CADDY_PORT: 80

networks:
  servicios_cine_private_net:
    external: true